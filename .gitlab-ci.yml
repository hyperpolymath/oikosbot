# OikosBot CI pipeline (GitLab mirror)

default:
  image: haskell:9.4

variables:
  CABAL_DIR: "$CI_PROJECT_DIR/.cabal"

cache:
  key:
    files:
      - analyzers/code-haskell/oikos-analyzer.cabal
  paths:
    - .cabal/packages/
    - .cabal/store/
    - analyzers/code-haskell/dist-newstyle/

stages:
  - lint
  - build
  - test

shell-wrapper:
  stage: lint
  image: bash:latest
  script:
    - bash -n bot-integration-affine/check.sh

haskell-build:
  stage: build
  script:
    - cd analyzers/code-haskell
    - cabal update
    - cabal build all

haskell-test:
  stage: test
  script:
    - cd analyzers/code-haskell
    - cabal update
    - cabal test all
