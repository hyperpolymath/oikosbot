#
# Oikos CI pipeline (GitLab)
#
# Stages: lint → test → build
# All jobs run in a Chainguard Rust image (distroless, no shell surprises).

default:
  image: cgr.dev/chainguard/rust:latest

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_INCREMENTAL: "0"           # deterministic builds in CI
  RUST_BACKTRACE: "1"

# Cache the Cargo registry and build artefacts across pipelines.
.cargo-cache: &cargo-cache
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

stages:
  - lint
  - test
  - build

# ── Lint stage ────────────────────────────────────────────────────────────────

fmt:
  stage: lint
  script:
    - cargo fmt --all --check
  allow_failure: false

clippy:
  stage: lint
  script:
    - cargo clippy --workspace --all-targets --all-features -- -D warnings
  <<: *cargo-cache

reuse:
  stage: lint
  image: fsfe/reuse:latest
  script:
    - reuse lint
  allow_failure: false

# ── Test stage ────────────────────────────────────────────────────────────────

unit-tests:
  stage: test
  script:
    - cargo test --workspace --lib
  <<: *cargo-cache

doc-tests:
  stage: test
  script:
    - cargo test --workspace --doc
  <<: *cargo-cache

# ── Build stage ───────────────────────────────────────────────────────────────

build-release:
  stage: build
  script:
    - cargo build --workspace --release
  <<: *cargo-cache
  artifacts:
    # Preserve the release binary for downstream jobs if/when a CLI crate exists.
    paths:
      - target/release/
    expire_in: 1 week
