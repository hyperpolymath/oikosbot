# Oikos Bot Configuration
# =======================
# Main configuration file for the Oikos Bot platform

# Bot operating mode
# - consultant: Answers questions, provides alternatives, explains trade-offs
# - advisor: Proactive suggestions on PRs, best practice recommendations
# - regulator: Enforces policy compliance, can block PRs
mode: advisor

# Score thresholds for policy levels
thresholds:
  eco_minimum:
    carbon: 50
    energy: 50
    description: "Minimum acceptable eco standards"
    enforcement: blocking  # Will block PRs below this threshold

  eco_standard:
    carbon: 70
    energy: 70
    description: "Recommended eco standards"
    enforcement: warning  # Will warn but not block

  eco_excellence:
    carbon: 85
    energy: 85
    description: "Excellence in eco practices"
    enforcement: none  # Just a badge/recognition

# Weights for composite health index
weights:
  ecological: 0.4   # Carbon + Energy + Resources
  economic: 0.3     # Pareto + Allocation + Debt
  quality: 0.3      # Complexity + Coupling + Coverage

# Analysis configuration
analysis:
  # Languages to analyze
  languages:
    - python
    - javascript
    - typescript
    - java
    - go
    - rust
    - haskell
    - ocaml

  # File patterns to exclude
  exclude:
    - "**/*.min.js"
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/.git/**"
    - "**/dist/**"
    - "**/build/**"

  # Carbon estimation model
  carbon:
    grid_intensity: 475  # gCO2eq/kWh (global average)
    hardware_lifespan: 4  # years
    usage_percentage: 0.01  # 1% of hardware

  # Energy pattern detection
  energy:
    detect_busy_waiting: true
    detect_polling: true
    detect_inefficient_io: true
    detect_resource_leaks: true

  # Complexity thresholds
  complexity:
    cyclomatic_warning: 10
    cyclomatic_critical: 20
    cognitive_warning: 15
    cognitive_critical: 30

# Datastore — single identity-consonance store (VeriSimDB).
# Replaces the retired ArangoDB (graph/document) + Virtuoso (RDF/semantic) pair:
# VeriSimDB represents one identity as an octad of modal witnesses, so its
# graph + document witnesses subsume ArangoDB and its semantic witness subsumes
# Virtuoso/RDF. See ARCHITECTURE.adoc and
# .machine_readable/integrations/verisimdb.a2ml.
#
# DEFERRED/GATED: VeriSimDB is v0.1.0 and the OikosBot runtime client is not yet
# wired (gated on VeriSimDB maturity + the AffineScript transport). Design/config
# only — see ROADMAP.adoc.
databases:
  verisimdb:
    # REST surface per connectors/shared/openapi/verisim-api-v1.yaml.
    # Provide the full base URL via env (use HTTPS for any shared/remote deploy).
    endpoint: "${VERISIMDB_ENDPOINT}"
    api_base: "/api/v1"
    query_language: vcl   # VeriSim Consonance Language (legacy name: VQL)
    drift_detection: true
    # Octad modal witnesses OikosBot reads/writes:
    octad:
      graph: true        # code-dependency edges, relationships (was ArangoDB)
      document: true     # analysis records, project metadata (was ArangoDB)
      semantic: true     # eco/econ ontology + proof blobs (was Virtuoso/RDF)
      vector: true       # embeddings for similarity search
      temporal: true     # analysis history / trends
      provenance: true   # scan/build origin + lineage
      tensor: false      # unused by OikosBot
      spatial: false     # unused by OikosBot
    # Semantic-witness ontology seed (relocated from databases/virtuoso/ontology.ttl):
    semantic_seed: "databases/ontology/eco.ttl"

# External integrations
integrations:
  github:
    enabled: true
    app_id: "${GITHUB_APP_ID}"
    webhook_secret: "${GITHUB_WEBHOOK_SECRET}"

  gitlab:
    enabled: true
    token: "${GITLAB_TOKEN}"
    webhook_secret: "${GITLAB_WEBHOOK_SECRET}"

  # Echidna for formal verification
  echidna:
    enabled: true
    endpoint: "https://gitlab.com/hyperpolymath/echidna"
    verify_pareto_claims: true

# AI assistant integration
ai_assistants:
  copilot:
    generate_instructions: true
    instruction_path: ".github/copilot-instructions.md"
    update_on_analysis: true

  claude_code:
    generate_instructions: true
    instruction_path: ".claude-code/instructions.md"
    update_on_analysis: true

# Praxis loop configuration
praxis:
  enabled: true
  learning_rate: 0.01
  min_observations: 10  # Before updating policies
  feedback_collection: true

  # What to learn from
  observation_sources:
    - pr_outcomes  # Did merged PRs improve metrics?
    - refactor_results  # Did suggested refactors help?
    - user_feedback  # Explicit feedback on recommendations

# Reporting configuration
reporting:
  # PR comment format
  pr_comments:
    enabled: true
    include_scores: true
    include_recommendations: true
    max_recommendations: 5  # In advisor mode
    include_pareto_analysis: true

  # SARIF output for code scanning
  sarif:
    enabled: true
    upload_to_github: true

  # OpenTelemetry metrics
  metrics:
    enabled: true
    endpoint: "${OTEL_ENDPOINT}"
    export_interval: 60  # seconds

  # Dashboard
  dashboard:
    enabled: true
    port: 8080

# Notification configuration
notifications:
  # Slack integration
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK}"
    channels:
      violations: "#oikos-bot-alerts"
      weekly_report: "#engineering"

  # Email
  email:
    enabled: false
    smtp_host: "${SMTP_HOST}"
    from: "oikos-bot@example.com"

# Logging
logging:
  level: info  # debug, info, warn, error
  format: json
  output: stdout
