# Oikos Bot - Continuous Integration

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  rescript:
    name: ReScript Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js (for ReScript compiler)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot-integration/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v1.1.4
        with:
          deno-version: v1.x

      - name: Install ReScript compiler
        working-directory: bot-integration
        run: npm ci

      - name: Build ReScript
        working-directory: bot-integration
        run: deno task build:rescript

      - name: Cache Deno dependencies
        working-directory: bot-integration
        run: deno cache src/Oikos.res.js

      - name: Run tests
        working-directory: bot-integration
        run: deno task test || echo "No tests yet"

  haskell:
    name: Haskell Analyzer
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Haskell
        uses: haskell-actions/setup@de26526e12bc780fb9d384c1fb61c0bf02e3a40d # v2.6.3
        with:
          ghc-version: "9.4"
          cabal-version: "3.10"

      - name: Cache Cabal
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            analyzers/code-haskell/dist-newstyle
          key: cabal-${{ runner.os }}-ghc9.4-${{ hashFiles('analyzers/code-haskell/eco-analyzer.cabal') }}

      - name: Build Haskell analyzer
        working-directory: analyzers/code-haskell
        run: |
          cabal update
          cabal build all
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v3.28.1
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true
